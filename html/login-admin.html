<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GH-Clean Schedule</title>
    <link rel="icon" type="image/svg+xml" href="../logo/favicon.svg">
    <meta name="description" content="Login admin untuk sistem jadwal piket asrama">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/login.css">
    <script>document.documentElement.classList.remove('light-mode');</script>
</head>
<body>

<div id="toastBox"></div>

<div class="bg-particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<div class="page" id="loginAdminPage">
    <div class="login-wrapper">
        <button class="btn-back" onclick="window.location.href='../index.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M5 12L11 18M5 12L11 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Kembali
        </button>

        <div class="login-card login-card-admin">
            <div class="login-card-header">
                <div class="login-avatar admin-avatar">
                    <svg width="40" height="40" viewBox="0 0 56 56" fill="none">
                        <rect x="8" y="12" width="40" height="28" rx="4" stroke="white" stroke-width="2.5" fill="none"/>
                        <path d="M8 20H48" stroke="white" stroke-width="2.5"/>
                        <circle cx="14" cy="16" r="1.5" fill="white"/>
                        <circle cx="20" cy="16" r="1.5" fill="white"/>
                        <circle cx="26" cy="16" r="1.5" fill="white"/>
                    </svg>
                </div>
                <h2>GH-Clean Schedule</h2>
            </div>

            <div class="login-form">
                <div class="input-group">
                    <div class="input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7 11V7C7 4.24 9.24 2 12 2C14.76 2 17 4.24 17 7V11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="16.5" r="1.5" fill="currentColor"/></svg>
                    </div>
                    <input type="password" id="inputPassAdmin" placeholder="Password Admin" aria-label="Password Admin">
                    <button type="button" class="toggle-password" id="togglePassAdmin" aria-label="Tampilkan password" tabindex="-1">
                        <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/></svg>
                        <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20C5 20 1 12 1 12A18.45 18.45 0 015.06 6.06M9.9 4.24A9.12 9.12 0 0112 4C19 4 23 12 23 12A18.5 18.5 0 0119.73 16.73" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 1L23 23" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                </div>

                <button class="btn-login btn-login-admin" onclick="prosesLoginAdmin()" id="btnLoginAdmin">
                    <span>Masuk sebagai Admin</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script type="module" src="../js/script-login-admin.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | GH-Clean Schedule</title>
    <link rel="icon" type="image/svg+xml" href="../logo/favicon.svg">
    <meta name="description" content="Dashboard mahasiswa untuk jadwal piket asrama">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/modal.css">
    <script>
        let sesi = sessionStorage.getItem('sesi_asrama');
        if(sesi) {
            let data = JSON.parse(sesi);
            if(data.theme === 'light') {
                document.documentElement.classList.add('light-mode');
            } else {
                document.documentElement.classList.remove('light-mode');
            }
        } else {
            document.documentElement.classList.remove('light-mode');
        }
    </script>
</head>
<body>

<div id="toastBox"></div>

<div class="bg-particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<div class="layout-app" id="appPage">
    <main class="main-content">
        <!-- Topbar -->
        <header class="topbar" style="padding-left: 20px;">
            <div class="topbar-left" style="display:flex; align-items:center; gap:16px;">
                <div style="width:44px; height:44px; background:#7c3aed; border-radius:10px; display:flex; align-items:center; justify-content:center;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 3L4 9v12h16V9l-8-6z"/></svg>
                </div>
                <div>
                    <h1 style="font-size:24px; font-weight:700; color:var(--text); margin:0 0 4px 0;">Dashboard Mahasiswa</h1>
                    <p style="font-size:14px; color:var(--text2); margin:0;" id="dashGreeting">Selamat datang, Mahasiswa 👋</p>
                </div>
            </div>
            <div class="topbar-right" style="display:flex; gap:8px; align-items:center;">
                <button class="icon-btn" onclick="toggleTheme()" title="Ganti Tema">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <button class="icon-btn" style="position:relative;" onclick="bukaProfil()" title="Profil Saya">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span id="badgeNotif" style="display:none; position:absolute; top:-2px; right:-2px; width:10px; height:10px; background:var(--red); border-radius:50%; border:2px solid var(--surface);"></span>
                </button>
                <button class="btn-delete" onclick="logoutSistem()" id="btnLogout" style="padding:8px 10px; margin:0; border-radius:10px;" title="Keluar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="margin:0;"><path d="M9 21H5C3.89 21 3 20.1 3 19V5C3 3.89 3.89 3 5 3H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="16,17 21,12 16,7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
            </div>
        </header>

        <div style="padding: 24px 32px;">
            <!-- Banner Broadcast -->
            <div id="bannerBroadcast" style="display:none; background:rgba(108,99,255,0.15); border:1px solid rgba(108,99,255,0.3); color:var(--text); padding:16px; border-radius:16px; margin-bottom:24px;">
                <h3 style="margin:0 0 8px 0; font-size:15px; color:var(--accent); display:flex; align-items:center; gap:6px;">📢 Pengumuman Asrama</h3>
                <p id="teksBannerBroadcast" style="margin:0; font-size:14px; line-height:1.5;"></p>
            </div>

            <!-- Banner Hari Ini -->
            <div id="bannerHariIni" style="display:none; background:linear-gradient(135deg, var(--orange), #ea580c); color:white; padding:16px; border-radius:16px; margin-bottom:24px; align-items:center; justify-content:space-between; box-shadow:0 4px 12px rgba(234,88,12,0.3);">
                <div>
                    <h3 style="margin:0 0 4px 0; font-size:16px; display:flex; align-items:center; gap:6px;">⚠️ HARI INI JADWAL PIKETMU!</h3>
                    <p style="margin:0; font-size:13px; opacity:0.9;">Jangan lupa kerjakan tugas: <b id="tugasHariIniText"></b></p>
                </div>
                <button onclick="document.getElementById('bannerHariIni').style.display='none'" style="background:rgba(255,255,255,0.2); border:none; color:white; border-radius:50%; width:30px; height:30px; cursor:pointer; font-weight:bold;">✕</button>
            </div>


            <!-- Mobile Filter / Actions -->
            <div class="mobile-filter-group" style="display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:24px; background:var(--surface); padding:12px 16px; border-radius:12px; border:1px solid var(--border);">
                <div style="display:flex; align-items:center; gap:8px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <span style="color:var(--text); font-weight:600;">Jadwal Piket</span>
                </div>
                
                <div style="flex-grow:1;"></div>
                
                <div style="display:flex; gap:8px; flex-wrap:wrap; background:var(--surface2); padding:4px; border-radius:14px; border:1px solid var(--border);">
                    <button id="tabSemua" class="btn-info-icon" style="width:auto; height:32px; padding:0 14px; border-radius:10px; background:var(--accent); color:white; border:none; margin:0; font-size:13px; font-weight:600;">Semua</button>
                    <button id="tabJadwalku" class="btn-info-icon" style="width:auto; height:32px; padding:0 14px; border-radius:10px; background:transparent; color:var(--text2); border:none; margin:0; font-size:13px; font-weight:600;">Jadwalku & Riwayat</button>
                </div>
            </div>
        </div>

        <div id="tabelKamarContainer" style="padding: 0 32px 32px;">
            <!-- Tabel kamar akan dirender lewat JS di sini -->
        </div>
        <div class="table-empty" id="tableEmpty" style="margin: 0 32px;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><rect x="9" y="3" width="6" height="4" rx="1" stroke="currentColor" stroke-width="1.5"/><line x1="9" y1="12" x2="15" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="9" y1="16" x2="13" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <p>Belum ada jadwal piket</p>
        </div>
    </main>
</div>

<input type="file" id="inputFoto" accept="image/*" multiple style="display: none;">

<!-- Modal: Profil User -->
<div id="modalProfil" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-header-bar">
            <h3>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/></svg>
                Profil Saya
            </h3>
            <button class="modal-close-x" onclick="tutupProfil()">✕</button>
        </div>
        <div class="info-box-data">
            <div class="info-row">
                <span class="info-label">Username</span>
                <span class="info-value" id="profilNama"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Kamar</span>
                <span class="info-value" id="profilKamar" style="background:var(--accent); color:white; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:bold;"></span>
            </div>
            <div class="info-row">
                <span class="info-label">No. HP</span>
                <span class="info-value" id="profilNowa"></span>
            </div>
            
            <hr style="border:none; border-top:1px solid var(--border); margin:16px 0;">
            
            <h4 style="font-size:13px; margin-bottom:10px; color:var(--text2);">Ganti Password</h4>
            <div class="form-group" style="margin-bottom:12px;">
                <input type="text" id="profilPassBaru" placeholder="Masukkan password baru" style="width:100%; padding:11px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-size:14px; font-family:inherit; outline:none;">
            </div>
            <button class="btn-save" style="width:100%; margin:0; border-radius:var(--radius-sm);" onclick="simpanPassword()">Simpan Password</button>
        </div>
        <button class="btn-modal-close" style="margin-top:0;" onclick="tutupProfil()">Tutup</button>
    </div>
</div>

<!-- Modal Preview Foto -->
<div id="modalPreviewUpload" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-header-bar">
            <h3>📷 Preview Bukti</h3>
            <button class="modal-close-x" onclick="tutupPreviewUpload()">✕</button>
        </div>
        <div style="padding:16px;">
            <p style="font-size:13px; color:var(--text2); margin-bottom:10px;">Pastikan foto jelas sebelum dikirim.</p>
            <div id="previewImagesContainer" style="display:flex; gap:10px; overflow-x:auto; margin-bottom:16px; padding-bottom:8px;"></div>
            
            <label style="font-size:12px; font-weight:600; color:var(--text2); display:block; margin-bottom:6px;">Pesan untuk Admin (Opsional)</label>
            <input type="text" id="pesanUploadUser" placeholder="Misal: Sudah bersih ya min" style="width:100%; padding:10px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-family:inherit; margin-bottom:16px; outline:none;">
            
            <button class="btn-save" id="btnConfirmUpload" style="width:100%; margin:0;">🚀 Kirim Sekarang</button>
        </div>
    </div>
</div>

<div id="modalPesanAdmin" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-header-bar modal-header-warning">
            <h3>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 4H20C21.1 4 22 4.9 22 6V18C22 19.1 21.1 20 20 20H4C2.9 20 2 19.1 2 18V6C2 4.9 2.9 4 4 4Z" stroke="currentColor" stroke-width="2" fill="none"/><polyline points="22,6 12,13 2,6" stroke="currentColor" stroke-width="2"/></svg>
                Pesan Pengurus
            </h3>
            <button class="modal-close-x" onclick="tutupPesanAdmin()">✕</button>
        </div>
        <div class="pesan-content">
            <p id="teksPesanAdmin"></p>
        </div>
        <button class="btn-modal-close btn-modal-understood" onclick="tutupPesanAdmin()">✓ Mengerti</button>
    </div>
</div>

<script type="module" src="../js/script-dashboard-user.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Riwayat Foto | GH-Clean Schedule</title>
    <link rel="icon" type="image/svg+xml" href="../logo/favicon.svg">
    <meta name="description" content="Galeri riwayat foto jadwal piket asrama">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/galeri-riwayat.css">
    <script>
        let sesi = sessionStorage.getItem('sesi_asrama');
        if(sesi) {
            let data = JSON.parse(sesi);
            if(data.theme === 'light') {
                document.documentElement.classList.add('light-mode');
            } else {
                document.documentElement.classList.remove('light-mode');
            }
        } else {
            document.documentElement.classList.remove('light-mode');
        }
    </script>
</head>

<body>

    <div id="toastBox"></div>

    <div class="bg-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="layout-app" id="appPage" style="flex-direction: column;">
        <!-- Topbar -->
        <header class="topbar" style="padding-left: 20px; z-index: 100; background: var(--surface);">
            <div class="topbar-left" style="display:flex; align-items:center; gap:16px;">
                <!-- Hamburger Button -->
                <div class="hamburger-btn" onclick="toggleSidebar()" title="Buka Menu Navigasi"
                    style="cursor:pointer; display:flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:8px; background:transparent; transition:background 0.2s;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text)"
                        stroke-width="2" stroke-linecap="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </div>
                <!-- House Logo -->
                <div style="width:34px; height:34px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
                        <path d="M12 3L4 9v12h16V9l-8-6z" />
                    </svg>
                </div>
                <div>
                    <h1 style="font-size:20px; font-weight:700; color:var(--text); margin:0; line-height:1; transform: translateY(-1px);">Galeri Riwayat</h1>
                    <p style="font-size:13px; color:var(--text2); margin:4px 0 0 0;">Riwayat Foto Bukti Piket (30 Hari Terakhir)</p>
                </div>
            </div>
            <div class="topbar-right">

            </div>
        </header>

        <div style="display: flex; flex: 1; overflow: hidden; position: relative;">
            <!-- Sidebar Persistent -->
            <aside id="appSidebar" class="sidebar-persistent collapsed" style="border-top: none;">
                <script>
                    if (localStorage.getItem('sidebar_state') === 'open' && window.innerWidth > 768) {
                        document.getElementById('appSidebar').classList.remove('collapsed');
                    }
                </script>
                <!-- Mobile Sidebar Header -->
                <div class="mobile-sidebar-header">
                    <button class="close-sidebar-btn" onclick="closeSidebarMobile()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                    <span class="logo-text">GH-Clean Schedule</span>
                </div>
                
                <div class="sidebar-menu" style="margin-top: 16px;">
                    <a href="dashboard-admin.html" class="sidebar-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="9" rx="1"></rect>
                            <rect x="14" y="3" width="7" height="5" rx="1"></rect>
                            <rect x="14" y="12" width="7" height="9" rx="1"></rect>
                            <rect x="3" y="16" width="7" height="5" rx="1"></rect>
                        </svg>
                        <span>Dashboard</span>
                    </a>
                    <a href="tambah-jadwal.html" class="sidebar-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        <span>Tambah Jadwal Baru</span>
                    </a>
                    <a href="javascript:void(0)" class="sidebar-item active">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <span>Galeri Riwayat Foto</span>
                    </a>
                    <a href="leaderboard.html" class="sidebar-item">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M8 21h8"></path>
                            <path d="M12 17v4"></path>
                            <path d="M7 4h10l1 8H6L7 4z"></path>
                            <path d="M5 12l-1 4h16l-1-4"></path>
                        </svg>
                        <span>Leaderboard</span>
                    </a>
                </div>

                <div class="sidebar-footer">
                    <div class="sidebar-divider"></div>
                    <div class="sidebar-menu">
                        <a href="javascript:void(0)" class="sidebar-item logout" onclick="logoutSistem()" title="Keluar Akun">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                <polyline points="16 17 21 12 16 7"></polyline>
                                <line x1="21" y1="12" x2="9" y2="12"></line>
                            </svg>
                            <span>Keluar Akun</span>
                        </a>
                    </div>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <div id="mobileOverlay" class="mobile-overlay" onclick="toggleSidebar()"></div>

                <div class="gallery-page-wrapper">
                    <div class="gallery-page-header">
                        <p class="section-label">Kumpulan bukti foto tugas piket dari seluruh user (30 hari terakhir)</p>
                    </div>

                    <div id="galeriRiwayatList" class="gallery-grid">
                        <!-- Items akan diinject dari JS -->
                    </div>

                    <div id="galeriRiwayatKosong" class="gallery-empty">
                        <svg class="gallery-empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <p>Belum ada riwayat foto yang tersimpan dalam sistem.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            if (window.innerWidth <= 768) {
                document.getElementById('appSidebar').classList.toggle('mobile-open');
                let overlay = document.getElementById('mobileOverlay');
                if (overlay.classList.contains('active')) {
                    overlay.classList.remove('active');
                    setTimeout(() => overlay.style.display = 'none', 300);
                    document.body.style.overflow = '';
                } else {
                    overlay.style.display = 'block';
                    setTimeout(() => overlay.classList.add('active'), 10);
                    document.body.style.overflow = 'hidden';
                }
            } else {
                let sidebar = document.getElementById('appSidebar');
                sidebar.classList.remove('keep-open'); // Force remove temporary lock
                sidebar.classList.toggle('collapsed');
                if (sidebar.classList.contains('collapsed')) {
                    localStorage.setItem('sidebar_state', 'collapsed');
                } else {
                    localStorage.setItem('sidebar_state', 'open');
                }
            }
        }
        function closeSidebarMobile() {
            if (window.innerWidth <= 768) {
                document.getElementById('appSidebar').classList.remove('mobile-open');
                let overlay = document.getElementById('mobileOverlay');
                overlay.classList.remove('active');
                setTimeout(() => overlay.style.display = 'none', 300);
                document.body.style.overflow = '';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            let sidebar = document.getElementById('appSidebar');
            let activeItem = document.querySelector('.sidebar-item.active');
            
            if(activeItem) {
                activeItem.addEventListener('click', function(e) {
                    if (window.innerWidth > 768) {
                        sidebar.classList.add('keep-open');
                        e.stopPropagation();
                    }
                });
            }

            let topbar = document.querySelector('.topbar');
            if(topbar) {
                topbar.addEventListener('click', function(e) {
                    if (window.innerWidth > 768 && sidebar.classList.contains('keep-open')) {
                        if (!e.target.closest('.hamburger-btn')) {
                            sidebar.classList.remove('keep-open');
                        }
                    }
                });
            }
        });
    </script>



    <script type="module" src="../js/script-galeri-riwayat.js"></script>

</body>

</html>

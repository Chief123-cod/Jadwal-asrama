<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GH-Clean Schedule</title>
    <link rel="icon" type="image/svg+xml" href="../logo/favicon.svg">
    <meta name="description" content="Login mahasiswa untuk sistem jadwal piket asrama">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/login.css">
    <script>document.documentElement.classList.remove('light-mode');</script>
</head>

<body>

    <div id="toastBox"></div>

    <div class="bg-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="page" id="loginUserPage">
        <div class="login-wrapper">
            <button class="btn-back" onclick="window.location.href='../index.html'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M19 12H5M5 12L11 18M5 12L11 6" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                Kembali
            </button>

            <div class="login-card login-card-user">
                <div class="login-card-header">
                    <div class="login-avatar user-avatar">
                        <svg width="40" height="40" viewBox="0 0 56 56" fill="none">
                            <circle cx="28" cy="20" r="10" stroke="white" stroke-width="2.5" fill="none" />
                            <path d="M10 46C10 36 18 30 28 30C38 30 46 36 46 46" stroke="white" stroke-width="2.5"
                                stroke-linecap="round" fill="none" />
                        </svg>
                    </div>
                    <h2>GH-Clean Schedule</h2>
                </div>

                <div class="login-form">
                    <div class="input-group">
                        <div class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                <path
                                    d="M22 16.92V19.92C22 20.48 21.56 20.93 21 20.97C20.74 20.99 20.48 21 20.22 21C10.96 21 3.45 13.49 3.03 4.23C3.01 3.97 3.00 3.71 3 3.44C3.04 2.89 3.48 2.44 4.04 2.44H7.04C7.52 2.44 7.93 2.8 7.99 3.27C8.04 3.68 8.14 4.08 8.27 4.46C8.41 4.87 8.31 5.33 7.99 5.65L6.75 6.89C8.07 9.42 10.12 11.47 12.65 12.79L13.89 11.55C14.21 11.23 14.67 11.13 15.08 11.27C15.46 11.4 15.86 11.5 16.27 11.55C16.75 11.61 17.1 12.02 17.1 12.5V15.5"
                                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                    stroke-linejoin="round" />
                            </svg>
                        </div>
                        <input type="text" inputmode="numeric" id="inputNoUser" placeholder="Nomor Handphone">
                    </div>

                    <div class="input-group">
                        <div class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor"
                                    stroke-width="1.5" fill="none" />
                                <path d="M7 11V7C7 4.24 9.24 2 12 2C14.76 2 17 4.24 17 7V11" stroke="currentColor"
                                    stroke-width="1.5" stroke-linecap="round" />
                                <circle cx="12" cy="16.5" r="1.5" fill="currentColor" />
                            </svg>
                        </div>
                        <input type="password" id="inputPassUser" placeholder="Password">
                    </div>

                    <button class="btn-login btn-login-user" onclick="prosesLoginUser()" id="btnLoginUser">
                        <span>Masuk</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../js/script-login-user.js"></script>

</body>

</html>

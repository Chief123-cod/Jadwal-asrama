<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GH-Clean Schedule</title>
    <link rel="icon" type="image/svg+xml" href="logo/favicon.svg">
    <meta name="description" content="Sistem manajemen jadwal piket asrama digital - GH Clean Schedule">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/home.css">
    <!-- Tema dimatikan di halaman ini -->
</head>

<body>

    <div id="toastBox"></div>

    <div class="bg-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="page" id="homePage">
        <div class="home-wrapper">
            <div class="home-header">
                <div class="logo-icon">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                        <rect width="48" height="48" rx="14" fill="url(#logoGrad)" />
                        <path d="M14 24L21 31L34 18" stroke="white" stroke-width="3.5" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <defs>
                            <linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48">
                                <stop stop-color="#6C63FF" />
                                <stop offset="1" stop-color="#3B82F6" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1>GH-Clean Schedule</h1>
                <p class="home-subtitle">Jadwal Piket Asrama Digital</p>
            </div>

            <div class="role-cards">
                <div class="role-card role-card-user" onclick="window.location.href='html/login-user.html'"
                    id="cardUser">
                    <div class="role-card-glow"></div>
                    <div class="role-icon">
                        <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
                            <circle cx="28" cy="20" r="10" stroke="currentColor" stroke-width="2.5" fill="none" />
                            <path d="M10 46C10 36 18 30 28 30C38 30 46 36 46 46" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" fill="none" />
                        </svg>
                    </div>
                    <h3>Mahasiswa</h3>
                    <p>Masuk sebagai penghuni asrama untuk melihat jadwal piket</p>
                    <div class="role-card-arrow">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                </div>

                <div class="role-card role-card-admin" onclick="window.location.href='html/login-admin.html'"
                    id="cardAdmin">
                    <div class="role-card-glow"></div>
                    <div class="role-icon">
                        <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
                            <rect x="8" y="12" width="40" height="28" rx="4" stroke="currentColor" stroke-width="2.5"
                                fill="none" />
                            <path d="M8 20H48" stroke="currentColor" stroke-width="2.5" />
                            <circle cx="14" cy="16" r="1.5" fill="currentColor" />
                            <circle cx="20" cy="16" r="1.5" fill="currentColor" />
                            <circle cx="26" cy="16" r="1.5" fill="currentColor" />
                            <rect x="14" y="26" width="16" height="3" rx="1.5" fill="currentColor" opacity="0.5" />
                            <rect x="14" y="32" width="10" height="3" rx="1.5" fill="currentColor" opacity="0.3" />
                        </svg>
                    </div>
                    <h3>Monitor</h3>
                    <p>Masuk sebagai pengurus untuk mengelola jadwal, menegur, dan memantau</p>
                    <div class="role-card-arrow">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                </div>
            </div>

            <p class="home-footer-text">🏠 Asrama Digital &mdash; Disiplin, Bersih, Nyaman</p>
        </div>
    </div>

    <script type="module">
        let sesi = sessionStorage.getItem("sesi_asrama");
        if (sesi) {
            let data = JSON.parse(sesi);
            if (data.role === "admin") {
                window.location.href = "html/dashboard-admin.html";
            } else {
                window.location.href = "html/dashboard-user.html";
            }
        }
    </script>

</body>

</html>
